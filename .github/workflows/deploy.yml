name: 🚀 Multi-Branch Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  web-deploy:
    name: 📂 Sync Files
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 📤 Sync to Production (Main)
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./public_html/
          protocol: sftp   # Switched to SFTP
          port: 22         # Switched to Port 22
          timeout: 120000  # Increased timeout for 4MB upload

      - name: 📤 Sync to Staging (Dev)
        if: github.ref == 'refs/heads/dev'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./dev/
          protocol: sftp   # Switched to SFTP
          port: 22         # Switched to Port 22
          timeout: 120000
          state-name: .dev-sync-state.json
